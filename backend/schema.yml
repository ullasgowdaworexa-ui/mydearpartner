components:
  schemas:
    BlogPost:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        title:
          type: string
          maxLength: 200
        excerpt:
          type: string
        image:
          type: string
          format: uri
          nullable: true
        date:
          type: string
          maxLength: 30
        author:
          type: string
          maxLength: 100
        category:
          type: string
          maxLength: 50
      required:
      - author
      - category
      - date
      - excerpt
      - id
      - title
    FAQ:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        question:
          type: string
          maxLength: 255
        answer:
          type: string
      required:
      - answer
      - id
      - question
    MemberComplaint:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        subject:
          type: string
          maxLength: 255
        description:
          type: string
        status:
          allOf:
          - $ref: '#/components/schemas/MemberComplaintStatusEnum'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - description
      - id
      - status
      - subject
      - updated_at
    MemberComplaintStatusEnum:
      enum:
      - OPEN
      - UNDER_REVIEW
      - ESCALATED
      - RESOLVED
      - CLOSED
      type: string
      description: |-
        * `OPEN` - Open
        * `UNDER_REVIEW` - Under review
        * `ESCALATED` - Escalated
        * `RESOLVED` - Resolved
        * `CLOSED` - Closed
    MemberProfileReport:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        reported_member:
          type: string
          format: uuid
        reason:
          type: string
          maxLength: 120
        details:
          type: string
        status:
          allOf:
          - $ref: '#/components/schemas/MemberProfileReportStatusEnum'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - reason
      - reported_member
      - status
      - updated_at
    MemberProfileReportStatusEnum:
      enum:
      - OPEN
      - UNDER_REVIEW
      - ACTIONED
      - DISMISSED
      type: string
      description: |-
        * `OPEN` - Open
        * `UNDER_REVIEW` - Under review
        * `ACTIONED` - Actioned
        * `DISMISSED` - Dismissed
    MembershipPlan:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 50
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
        price:
          type: string
