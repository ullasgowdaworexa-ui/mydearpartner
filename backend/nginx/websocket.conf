# Nginx WebSocket proxy configuration for Django Channels
#
# Include this file in the main nginx.conf server block:
#   include /path/to/websocket.conf;
#
# Production frontend must use wss://domain.com/ws/notifications/
# Do not use ws:// from an HTTPS website.

location /ws/ {
    proxy_pass http://backend;
    proxy_http_version 1.1;

    # WebSocket upgrade headers
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Standard proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Long timeout for persistent WebSocket connections
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;

    # Disable buffering for WebSocket
    proxy_buffering off;
}
