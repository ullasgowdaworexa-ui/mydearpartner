worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    # The profile-photo API independently validates a 10 MiB pre-processing
    # limit; reject larger multipart bodies before they reach Django.
    client_max_body_size 10m;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Preserve HTTPS from a TLS-terminating load balancer; direct HTTP requests
    # continue to report their real scheme and can be redirected by Django.
    map $http_x_forwarded_proto $proxy_forwarded_proto {
        default $scheme;
        https https;
    }

    upstream django_backend {
        server backend:8000;
        keepalive 32;
    }

    upstream nextjs_frontend {
        server nextjs:3000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

        location = /nginx-health {
            access_log off;
            default_type text/plain;
            return 200 "healthy\n";
        }

        location = /api {
            return 308 /api/;
        }

        # These routes are implemented by the Next.js BFF, not Django.  Keep
        # this ahead of the general /api/ location so authenticated browser
        # requests can exchange the HttpOnly refresh cookie for a short-lived
        # access token and forward protected photo requests to Django.
        location ^~ /api/proxy/ {
            proxy_pass http://nextjs_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
            proxy_set_header Connection "";
            proxy_connect_timeout 30s;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            proxy_buffering on;
            proxy_buffer_size 16k;
            proxy_buffers 8 32k;
        }

        location ^~ /api/auth/ {
            proxy_pass http://nextjs_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
            proxy_set_header Connection "";
        }

        location ^~ /api/ai/ {
            proxy_pass http://nextjs_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
            proxy_set_header Connection "";
        }

        # PostgreSQL BYTEA profile images remain authenticated/private.  This
        # more-specific location intentionally preserves Django's ETag and
        # Cache-Control headers instead of applying the general API no-store
        # policy below.
        location ^~ /api/profile-photos/ {
            proxy_pass http://django_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
            proxy_set_header Connection "";
            proxy_connect_timeout 30s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_buffering on;
            proxy_buffer_size 16k;
            proxy_buffers 8 32k;
        }

        location ^~ /api/v1/profile-photos/ {
            proxy_pass http://django_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
            proxy_set_header Connection "";
            proxy_connect_timeout 30s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_buffering on;
            proxy_buffer_size 16k;
            proxy_buffers 8 32k;
        }

        location ^~ /api/ {
            proxy_pass http://django_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            proxy_buffering off;
            add_header Cache-Control "no-store" always;
        }

        location = /django-admin {
            return 308 /django-admin/;
        }

        location ^~ /django-admin/ {
            proxy_pass http://django_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        location = /ws {
            return 308 /ws/;
        }

        location ^~ /ws/ {
            proxy_pass http://django_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 10s;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
        }

        location ^~ /static/ {
            alias /app/staticfiles/;
            access_log off;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }

        # Legacy profile paths are deliberately unavailable: profile images now
        # exist only in PostgreSQL and are served via /api/profile-photos/.
        location ^~ /media/member_photos/ {
            return 404;
        }

        # Other non-profile content may still use this legacy location during
        # its separate migration.  It is never used for member profile photos.
        location ^~ /media/ {
            alias /app/media/;
            access_log off;
            expires 1h;
            add_header Cache-Control "public, max-age=3600" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        location ^~ /_next/static/ {
            proxy_pass http://nextjs_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
            proxy_set_header Connection "";
            access_log off;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }

        location / {
            proxy_pass http://nextjs_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }
    }
}
